<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Dashboard – Statistics</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>" />
</head>
<body>

  <!-- ── Navigation ─────────────────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="navbar__brand" aria-label="News Dashboard home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l6 6v8a2 2 0 01-2 2z"/>
        <path d="M15 2v6h6M9 15h6M9 11h6M9 7h2"/>
      </svg>
      NewsDash
    </a>

    <ul class="navbar__links" id="nav-links" role="list">
      <li><a href="index.html">🏠 Home</a></li>
      <li><a href="matches.html">⚽ Matches</a></li>
      <li><a href="table.html">📊 Table</a></li>
      <li><a href="stats.html" class="active">🏅 Stats</a></li>
    </ul>

    <button class="navbar__toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ── Page content ───────────────────────────────────────────────────── -->
  <div class="page-wrapper">
    <h1 class="page-title">🏅 Player Statistics</h1>

    <div class="stats-sections">

      <!-- ── Top Scorers ──────────────────────────────────────────────── -->
      <section aria-labelledby="scorers-heading">
        <h2 class="section-heading" id="scorers-heading">⚽ Top Scorers</h2>

        <div class="stats-controls" role="toolbar" aria-label="Sort top scorers">
          <span style="font-size:.8rem;font-weight:600;color:var(--clr-muted);align-self:center;">Sort by:</span>
          <button class="sort-btn active" data-sort-section="scorers" data-sort-key="goals">Goals ↓</button>
          <button class="sort-btn" data-sort-section="scorers" data-sort-key="assists">Assists</button>
          <button class="sort-btn" data-sort-section="scorers" data-sort-key="penalty_goals">Penalty Goals</button>
        </div>

        <div class="stats-section__grid" id="scorers-grid" aria-live="polite">
          <div class="spinner-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </section>

    </div><!-- /.stats-sections -->
  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer class="footer">
    <p>© 2024 NewsDash · Powered by AllSportsAPI</p>
  </footer>

  <!-- ── Scripts ────────────────────────────────────────────────────────── -->
  <script src="config.js"></script>
  <script src="js/stats.js"></script>
  <script>
    // Mobile nav toggle
    const navToggle = document.getElementById("nav-toggle");
    const navLinks  = document.getElementById("nav-links");
    navToggle.addEventListener("click", () => {
      const isOpen = navLinks.classList.toggle("open");
      navToggle.setAttribute("aria-expanded", String(isOpen));
    });

    document.addEventListener("DOMContentLoaded", initStats);
  </script>
</body>
</html>
